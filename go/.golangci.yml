# golangci-lint configuration for the Tether Go daemon.
# See plan.md §0.8 for the enforced gate.
run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - gofmt
    - goimports
    - errcheck
    - gosec
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/jbutlerdev/tether/go
  gofmt:
    simplify: true
  revive:
    rules:
      - name: exported
      - name: package-comments
      - name: var-naming
      - name: error-strings

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
