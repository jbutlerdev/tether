version: "2"
run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/jbutlerdev/tether/go

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - revive
  settings:
    revive:
      rules:
        - name: exported
        - name: error-strings
