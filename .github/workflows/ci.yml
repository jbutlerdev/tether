name: ci

on:
  push:
    branches: [main, 'phase/*']
  pull_request:

# Required status checks: go-test, go-lint, cpp-format, proto-verify,
# firmware-build-m5, firmware-test-bridge. PRs blocked if any fail.
#
# See plan.md §1.3.

env:
  GOWORK: off   # tether ships its own go.mod; ignore parent go.work files

jobs:
  go-test:
    name: go-test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Download modules
        working-directory: go
        run: go mod download
      - name: Run tests
        working-directory: go
        run: |
          go test -race -coverprofile=cover.out -covermode=atomic ./...
      - name: Enforce coverage gate
        run: |
          bash scripts/cover.sh cover.out 80

  go-lint:
    name: go-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go
          args: --config go/.golangci.yml

  cpp-format:
    name: cpp-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          clang-format --version
          find firmware/ -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \
              | xargs clang-format --dry-run --Werror

  proto-verify:
    name: proto-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: |
          sudo apt-get update
          PROTOC_ZIP=protoc-25.1-linux-x86_64.zip
          sudo apt-get install -y unzip
          curl -fLO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/$PROTOC_ZIP
          sudo unzip -o $PROTOC_ZIP -d /usr/local
          rm $PROTOC_ZIP
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - name: Regenerate protos
        run: bash proto/gen.sh
      - name: Verify no diff
        run: |
          git diff --exit-code proto/ go/pkg/protocol/

  firmware-build-m5:
    name: firmware-build-m5
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: idf.py build
        working-directory: firmware/m5
        run: idf.py build

  firmware-test-bridge:
    name: firmware-test-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: pio test
        working-directory: firmware/bridge
        run: pio test
