name: ci

on:
  push:
    branches: [main, 'phase/*']
  pull_request:

# Required status checks: go-test, go-lint, cpp-format, proto-verify,
# firmware-build-m5, firmware-test-bridge. PRs blocked if any fail.
#
# See plan.md §1.3.

env:
  GOWORK: off   # tether ships its own go.mod; ignore parent go.work files

jobs:
  go-test:
    name: go-test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Match go/go.mod's required toolchain (go 1.25.0). Without
          # this, the auto-downloaded toolchain is missing the covdata
          # binary needed for -covermode=atomic on the generated
          # protocolpb package.
          go-version: '1.25'
      - name: Download modules
        working-directory: go
        run: go mod download
      - name: Run tests
        working-directory: go
        run: |
          go test -race -coverprofile=cover.out -covermode=atomic ./...
      - name: Enforce coverage gate
        run: |
          bash scripts/cover.sh cover.out 80

  go-lint:
    name: go-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Use a v2.x release built with Go 1.25. Earlier v2.0.x
          # releases were built with Go 1.24 and refuse to lint
          # modules targeting Go 1.25.
          version: v2.12.2
          working-directory: go
          # Config path is relative to working-directory; `go/` is
          # already the cwd, so the config is `.golangci.yml` there.
          args: --config .golangci.yml

  cpp-format:
    name: cpp-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          clang-format --version
          # Exclude PlatformIO dependency cache (.pio/) and local build
          # artefacts (build/) which hold third-party headers and
          # generated code that are not under our formatting control.
          find firmware/ -type d \( -name '.pio' -o -name 'build' -o -name '.git' \) -prune \
              -o \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print \
              | xargs clang-format --dry-run --Werror

  proto-verify:
    name: proto-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: |
          sudo apt-get update
          # Pin protoc to v28.0 to match the version header in the
          # committed go/pkg/protocol/protocolpb/*.pb.go. Drift
          # produces diff noise on every CI run.
          PROTOC_ZIP=protoc-28.0-linux-x86_64.zip
          sudo apt-get install -y unzip
          curl -fLO https://github.com/protocolbuffers/protobuf/releases/download/v28.0/$PROTOC_ZIP
          sudo unzip -o $PROTOC_ZIP -d /usr/local
          rm $PROTOC_ZIP
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install pinned protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
      - name: Regenerate protos
        run: bash proto/gen.sh
      - name: Verify no diff
        run: |
          git diff --exit-code proto/ go/pkg/protocol/

  firmware-build-m5:
    name: firmware-build-m5
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # The espressif/idf image has idf.py installed under
      # /opt/esp/idf, but the env vars (IDF_PATH, PATH additions,
      # Python venv activate) are not exported by default. Source
      # the env script and run idf.py in the SAME shell so the
      # env carries through.
      - name: idf.py build
        working-directory: firmware/m5
        run: |
          . /opt/esp/idf/export.sh > /dev/null
          idf.py build

  firmware-test-bridge:
    name: firmware-test-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: pio test
        working-directory: firmware/bridge
        # Restrict to the native env: the rak4631 env compiles + tries
        # to upload to a physical RAK4631, which requires --upload-port
        # and a USB device. The on-device bench test is executed by a
        # separate HIL workflow (see plan §3.5 / bench_test.cpp).
        run: pio test -e native
