name: firmware-build

on:
  push:
    branches: [main, 'phase/*']
  pull_request:

jobs:
  m5:
    name: m5-esp-idf-build
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.2
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Source ESP-IDF environment and build
        run: |
          . /opt/esp/idf/export.sh > /dev/null
          cd firmware/m5
          # Set target on first run; the sdkconfig is .gitignored so
          # a fresh checkout has no target. Subsequent CI runs are
          # fast (set-target is a no-op if the target is already
          # configured and the sdkconfig is cached).
          idf.py set-target esp32s3
          idf.py build

  m5-t3s3-mvsr:
    name: m5-t3s3-mvsr-build
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.2
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Source ESP-IDF environment and build the LilyGO T3-S3 MVSR variant
        run: |
          . /opt/esp/idf/export.sh > /dev/null
          cd firmware/m5
          # Select the MVSR variant via its sdkconfig defaults overlay.
          # The overlay sets CONFIG_TETHER_BOARD_T3S3_MVSR=y and switches
          # SPIRAM to QUAD (the T3-S3 module is QSPI, not OPI — see
          # sdkconfig.defaults.t3s3_mvsr). SDKCONFIG_DEFAULTS must be
          # passed to set-target (not just reconfigure) because set-target
          # creates the persisted sdkconfig; if it's created from the M5
          # defaults first, the later reconfigure won't override the
          # already-set Kconfig choice.
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.t3s3_mvsr" set-target esp32s3
          idf.py build


  bridge:
    name: bridge-platformio-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PlatformIO
        run: |
          python3 -m pip install --upgrade pip
          pip install platformio
      - name: Test bridge firmware
        # Restrict to the native env: the rak4631 env compiles + tries
        # to upload to a physical RAK4631, which requires --upload-port
        # and a USB device. The on-device bench test is executed by a
        # separate HIL workflow (see plan §3.5 / bench_test.cpp).
        run: |
          cd firmware/bridge
          pio test -e native
