; PlatformIO project for the Tether RAK4631 bridge (nRF52840 + SX1262).
; See plan.md §1.1, §3.
;
; Two environments:
;   * rak4631  — real hardware, Arduino + RadioLib, used for bench testing.
;                Production sources only; *_test.cpp files are excluded.
;   * native   — host (Linux) test runner with Unity; runs the unit tests.
;                Compiles all production sources + the *_test.cpp files
;                (per plan.md §13, all C++ lives under src/).
;
; The host build defines TETHER_BRIDGE_HOST_TEST, which guards any code
; path that depends on the Arduino framework (Serial, FreeRTOS).
;
; Test discovery: PlatformIO's unity runner only inspects test/test_*/. Per
; plan.md §13 the test source files live in src/, so each test/ subdir
; contains a single test_<name>.cpp that #includes the corresponding
; src/<name>_test.cpp.

[env:rak4631]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
monitor_speed = 921600
platform_packages =
    toolchain-gccarmnoneeabi@1.140201.0
lib_deps =
    jgromes/RadioLib
    Wire
; The arduino-nrf52 platform injects -std=gnu++11 into the build. We
; need C++17 minimum for std::optional / std::span. Strip the platform
; flag and put -std=gnu++17 last so it wins. We also need -fexceptions
; because frame.cpp throws std::invalid_argument on oversize payload
; (per plan §3.1).
build_unflags = -std=gnu++11 -std=c++11 -fno-exceptions
build_flags =
    -std=c++20
    -Wall
    -Wextra
    -fexceptions
; Production sources only — no test files in the firmware image.
; lora_radiolib.cpp is the RadioLib-backed RadioBackend implementation
; and is only meaningful on real hardware. main.cpp provides setup()
; and loop() and is compiled in the regular (firmware) build.
build_src_filter = +<*> -<*_test.cpp>
; On-device tests are limited to the bench test stub. The PlatformIO
; test runner compiles the test_*.cpp file (and any src/* via
; test_build_src) but does NOT include main.cpp — the runner supplies
; its own main(). So we don't need a separate test_build_src_filter.
;
; The on-device bench is hardware-in-the-loop only (see plan §3.5).
; `pio test` is invoked by the agent-loop and CI without a real
; RAK4631 attached; the upload step then errors out. `test_ignore = *`
; keeps `pio test` runnable end-to-end on those hosts by skipping the
; rak4631 env entirely. The HIL workflow overrides this with
; `pio test -e rak4631 -i "" --upload-port <port>` to actually run
; the bench on real hardware.
test_filter = test_bench
test_ignore = *
test_build_src = yes

[env:native]
platform = native
build_flags =
    -std=c++20
    -Wall
    -Wextra
    -Wpedantic
    -Werror
    -O0
    -g
    --coverage
    -fprofile-arcs
    -ftest-coverage
    -DTETHER_BRIDGE_HOST_TEST
    -lgcov
build_src_flags =
    -std=c++20
    -Wall
    -Wextra
    -Wpedantic
    -O0
    -g
    --coverage
    -fprofile-arcs
    -ftest-coverage
    -DTETHER_BRIDGE_HOST_TEST
build_src_filter = +<*> -<*_test.cpp> -<main.cpp> -<lora_radiolib.cpp>
; Compile the production sources into the test binary so coverage and
; integration tests exercise the real code paths.
test_build_src = yes
